# Render Blueprint Specification
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: eduzet-api
    runtime: node
    region: singapore  # Closest to Indonesian users
    plan: free         # Change to 'starter' for production

    # Build & Start
    buildCommand: npm install
    startCommand: node src/app.js

    # Health Check
    healthCheckPath: /api/health

    # Environment Variables (set these in Render Dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false  # Set manually in Dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MIDTRANS_MERCHANT_ID
        sync: false
      - key: MIDTRANS_CLIENT_KEY
        sync: false
      - key: MIDTRANS_SERVER_KEY
        sync: false
      - key: MIDTRANS_IS_PRODUCTION
        value: "false"
      - key: CLIENT_URL
        sync: false  # Set to your Vercel URL
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
